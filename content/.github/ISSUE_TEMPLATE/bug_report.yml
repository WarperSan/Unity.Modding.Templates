name: Bug Report
description: Report a bug in this mod
labels: ["bug"]

body:
  - type: textarea
    id: issue-description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: What went wrong?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Observe the issue
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen instead.
      placeholder: The mod should...
    validations:
      required: false

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened.
      placeholder: Instead, the mod...
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant setup information.
      placeholder: |
        - Mod version:
        - Game version:
        - OS:
        - Other mods (if applicable):
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs / Crash Reports
      description: Paste any relevant logs or crash reports here.
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or links that may help.
      placeholder: Anything else that might help us diagnose the issue.
    validations:
      required: false